# Add your additional Hyprland configurations here

# ==========================================
# Keyboard shortcuts
# ==========================================

# 1. Terminal & Floating Window
unbind = $mainMod, RETURN
unbind = $mainMod, T
bind = $mainMod, T, exec, ~/.config/ml4w/settings/terminal.sh
bind = $mainMod, W, togglefloating

# 2. Application Launcher (Toggle)
unbind = $mainMod CTRL, RETURN
bind = $mainMod, A, exec, pkill rofi || ~/.config/hypr/scripts/launcher.sh

# 3. Clipboard Manager (Toggle)
unbind = $mainMod, V
bind = $mainMod, V, exec, pkill rofi || ~/.config/ml4w/scripts/ml4w-cliphist

# 4. Special Workspace (Scratchpad)
unbind = $mainMod, S
unbind = $mainMod SHIFT, S
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic

# 5. Screenshots (Swappy menu)
unbind = $mainMod, PRINT
unbind = $mainMod ALT, F
unbind = $mainMod ALT, S
bind = $mainMod, P, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod ALT, P, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | swappy -f -
bind = $mainMod CTRL, P, exec, grim - | swappy -f -

# 6. Move active window to workspace silently
unbind = $mainMod SHIFT, 1
unbind = $mainMod SHIFT, 2
unbind = $mainMod SHIFT, 3
unbind = $mainMod SHIFT, 4
unbind = $mainMod SHIFT, 5
unbind = $mainMod SHIFT, 6
unbind = $mainMod SHIFT, 7
unbind = $mainMod SHIFT, 8
unbind = $mainMod SHIFT, 9
unbind = $mainMod SHIFT, 0

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
